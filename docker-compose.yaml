services:
  db:
    image: postgres:15
    container_name: sportz-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres 
      POSTGRES_DB: sportz
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: .
      args:
        DATABASE_URL: postgres://postgres:postgres@db:5432/sportz
    container_name: sportz-backend
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/sportz
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm run dev"
    volumes:
      - .:/app
      - /app/node_modules
volumes:
  db_data: