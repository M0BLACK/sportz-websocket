<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotrly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
            },
            colors: {
              'brand-bg': '#0f172a',         // Deep slate
              'brand-card': '#1e293b',       // Slightly lighter slate for cards
              'brand-text-main': '#f8fafc',  // Off-white for primary text
              'brand-text-muted': '#94a3b8', // Muted slate for secondary text
              'brand-live': '#10b981',       // Neon emerald for "Live" dots
              'brand-score': '#fbbf24',      // Amber yellow for scores
              'brand-accent': '#3b82f6',     // Bright blue for buttons/links
            },
            boxShadow: {
              'hard': '4px 4px 0px 0px #020617',
              'hard-sm': '2px 2px 0px 0px #020617',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0f172a;
        color: #f8fafc;
      }
    </style>
  <script type="importmap">

  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",

}
</script>
